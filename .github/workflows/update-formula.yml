name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string
      sha256:
        description: 'SHA256 of the release tarball'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump formula
        run: |
          sed -i 's/version ".*"/version "${{ inputs.version }}"/' Formula/nanobar.rb
          sed -i 's/sha256 ".*"/sha256 "${{ inputs.sha256 }}"/' Formula/nanobar.rb

      - name: Verify
        run: |
          grep 'version' Formula/nanobar.rb
          grep 'sha256' Formula/nanobar.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nanobar.rb
          git commit -m "nanobar ${{ inputs.version }}"
          git push
